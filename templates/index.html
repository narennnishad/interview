{% extends "base.html" %}

{% block content %}
<header>
    <h1>Mastery in interview</h1>
    <p class="subtitle">Complete Interview Preparation Kit with Curated Learning Paths</p>
</header>

<div class="spark-link-container">
    <a href="https://pdf-merge-and-converter-onrender.com" target="_blank" class="spark-link">
        ✨ pdf merge and converter ✨
    </a>
</div>

<div class="grid">
    {% for set_id, set_info in sets.items() %}
    <div class="card">
        <h2>{{ set_info.name }}</h2>
        <p>{{ set_info.description }}</p>
        <a href="{{ url_for('view_set', set_id=set_id) }}" class="btn">Examine Materials</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
