<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery in interview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.8s ease-out both;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            text-align: center;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .pdf-list {
            list-style: none;
        }

        .pdf-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
            border-radius: 0.75rem;
            transition: background 0.3s ease;
        }

        .pdf-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .pdf-link {
            display: block;
            padding: 1rem 1.5rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .pdf-link:before {
            content: "📄";
            margin-right: 0.75rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Search Bar Styles */
        .search-container {
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
            animation: fadeIn 1s ease-out;
        }

        .search-form {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-right: 4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .search-btn:hover {
            background: var(--primary-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        /* Spark Fancy Link Styles */
        .spark-link-container {
            text-align: center;
            margin-top: -2rem;
            margin-bottom: 4rem;
        }

        .spark-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            text-decoration: none;
            background: linear-gradient(90deg, #ff00cc, #3333ff, #ff00cc);
            background-size: 200% auto;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.4);
            animation: gradientMove 3s linear infinite, glowPulse 2s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .spark-link:hover {
            transform: scale(1.05);
        }

        .spark-link i {
            font-size: 1.4rem;
        }

        @keyframes gradientMove {
            to { background-position: 200% center; }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 204, 0.4); }
            50% { box-shadow: 0 0 30px rgba(51, 51, 255, 0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spark-link-container">
            <a href="https://pdf-merge-and-converter.onrender.com" target="_blank" class="spark-link">
                ✨ pdf merge and converter ✨
            </a>
        </div>
        <div class="search-container">
            <form action="{{ url_for('search') }}" method="get" class="search-form">
                <input type="text" name="q" class="search-input" placeholder="Search for topics (e.g. UDM, Docker, K8s...)" required>
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
